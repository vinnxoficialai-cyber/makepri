  <!-- Dynamic Primary Color System -->
  <style>
    :root {
      --primary: 219 39 119;
      --primary-50: 253 242 248;
      --primary-500: 219 39 119;
      --primary-600: 190 24 93;
      --primary-700: 162 28 78;
    }
  </style>
  <!-- Primary color is defined in :root above. No localStorage override needed. -->


  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function _wo(v) {
      return function ({ opacityValue }) {
        return opacityValue !== undefined
          ? 'rgb(' + v + ' / ' + opacityValue + ')'
          : 'rgb(' + v + ')';
      };
    }
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: _wo('var(--primary)'),
              50: _wo('var(--primary-50)'),
              500: _wo('var(--primary-500)'),
              600: _wo('var(--primary-600)'),
              700: _wo('var(--primary-700)'),
            },
            dark: {
              DEFAULT: '#0f172a',
              surface: '#1e293b',
              border: '#334155',
              text: '#e2e8f0'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* ===== 80mm Thermal Receipt Print Styles ===== */
    @media print {
      @page {
        size: 80mm auto;
        margin: 0;
      }

      /* Hard reset EVERYTHING */
      * {
        color: #000 !important;
        background: #fff !important;
        box-shadow: none !important;
        text-shadow: none !important;
        border-color: #000 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      html,
      body {
        width: 80mm !important;
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        overflow: visible !important;
        font-family: 'Courier New', 'Courier', monospace !important;
        font-size: 13px !important;
        font-weight: 700 !important;
        line-height: 1.3 !important;
        letter-spacing: 0 !important;
      }

      /* Hide EVERYTHING */
      body>* {
        display: none !important;
        height: 0 !important;
        overflow: hidden !important;
      }

      /* Show receipt and ancestors */
      #thermal-receipt,
      #thermal-receipt * {
        display: revert !important;
        visibility: visible !important;
        height: auto !important;
        overflow: visible !important;
      }

      /* Force all receipt ancestors to be static blocks */
      div:has(#thermal-receipt) {
        display: block !important;
        position: static !important;
        width: 80mm !important;
        max-width: 80mm !important;
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #fff !important;
        border: none !important;
        border-radius: 0 !important;
        overflow: visible !important;
        inset: unset !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        opacity: 1 !important;
      }

      /* The receipt itself */
      #thermal-receipt {
        display: block !important;
        width: 76mm !important;
        max-width: 76mm !important;
        height: auto !important;
        padding: 2mm !important;
        margin: 0 !important;
        background: #fff !important;
        color: #000 !important;
        font-family: 'Courier New', 'Courier', monospace !important;
        font-size: 13px !important;
        font-weight: 700 !important;
        line-height: 1.3 !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        overflow: visible !important;
      }

      /* Force ALL text black and bold */
      #thermal-receipt p,
      #thermal-receipt span,
      #thermal-receipt div,
      #thermal-receipt strong,
      #thermal-receipt h2,
      #thermal-receipt h3,
      #thermal-receipt td,
      #thermal-receipt th {
        color: #000 !important;
        font-family: 'Courier New', 'Courier', monospace !important;
        font-weight: 700 !important;
        word-wrap: break-word !important;
        overflow-wrap: break-word !important;
      }

      /* Receipt title bigger */
      #thermal-receipt .receipt-title {
        font-size: 18px !important;
        font-weight: 900 !important;
        letter-spacing: 1px !important;
      }

      /* Receipt separator lines */
      #thermal-receipt .receipt-sep {
        border: none !important;
        border-top: 2px dashed #000 !important;
        margin: 3mm 0 !important;
      }

      /* Bold total line */
      #thermal-receipt .receipt-total {
        font-size: 16px !important;
        font-weight: 900 !important;
      }

      /* Truncate fix */
      #thermal-receipt .truncate {
        overflow: visible !important;
        text-overflow: unset !important;
        white-space: normal !important;
        word-wrap: break-word !important;
      }

      /* Hide non-print elements */
      .no-print,
      .print\\:hidden,
      [class*="print:hidden"] {
        display: none !important;
      }
    }
  </style>
